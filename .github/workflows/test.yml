name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  small:
    name: test (small)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install hidapi
        run: brew install hidapi

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # -short forces TestRealHID_Smoke (in internal/via) to skip without
      # touching real HID, so this job never depends on a physical device.
      - name: go test (small)
        run: go test -race -short -timeout 1m ./internal/keymap/... ./internal/via/... ./internal/viatest/...

  medium:
    name: test (medium)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install hidapi
        run: brew install hidapi

      - name: go test (medium)
        run: go test -race -timeout 5m ./internal/ui/... ./e2e/...
