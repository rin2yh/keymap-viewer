name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: |
          rewritten=$(go fmt ./...)
          if [ -n "$rewritten" ]; then
            echo "::error::go fmt rewrote files:"
            echo "$rewritten"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # vet type-checks every transitive Cgo package, so the Ebiten and
      # go-hid C headers must be present even though the job never builds
      # or runs the binary.
      - name: Install Cgo headers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhidapi-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libasound2-dev \
            pkg-config

      - name: lint
        run: go vet ./...
